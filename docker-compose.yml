version: "3.8"

services:
  # ============================
  # ORCHESTRATOR
  # ============================
  orchestrator:
    build: ./orchestrator
    container_name: wa-orchestrator
    ports:
      - "7070:7070"
    environment:
      ORCH_KEY: "P+Zt3wG...EKSJz/NlT8="
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped

  # ============================
  # WHATSAPP IMAGE BUILDER ONLY
  # (never runs as a container)
  # ============================
  whatsapp-builder:
    build: ./whatsapp-app
    image: whatsapp-service
    deploy:
      replicas: 0
