version: "3.8"

services:
  redis:
    image: redis:7-alpine
    container_name: wa-redis
    ports:
      - "6380:6379"
    restart: unless-stopped
    networks:
      - wa-net

  orchestrator:
    build:
      context: ./orchestrator
    image: wa-orchestrator:latest
    container_name: wa-orchestrator
    ports:
      - "7070:7070"
    environment:
      ORCH_KEY: "REPLACE_WITH_YOUR_KEY"
      WA_NETWORK: "wa-net"
      WA_IMAGE: "whatsapp-service:latest"
      REDIS_URL: "redis://wa-redis:6380"
    depends_on:
      - redis
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - wa-net
    restart: unless-stopped

networks:
  wa-net:
    external: true
    name: wa-net