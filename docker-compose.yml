version: "3.8"

services:
  orchestrator:
    build:
      context: ./orchestrator
    image: wa-orchestrator:latest
    container_name: wa-orchestrator
    ports:
      - "7070:7070"
    environment:
      ORCH_KEY: "REPLACE_WITH_YOUR_KEY"
      WA_NETWORK: "wa-net"
      WA_IMAGE: "whatsapp-service:latest"
      INTERNAL_TIMEOUT_MS: "15000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - wa-net
    restart: unless-stopped

networks:
  wa-net:
    external: true
    name: wa-net
