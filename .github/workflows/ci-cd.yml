name: CI/CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: whatsapp-node-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: whatsapp-app/package-lock.json

      - name: Install WhatsApp app dependencies
        working-directory: whatsapp-app
        run: npm ci

      - name: Validate WhatsApp app syntax
        working-directory: whatsapp-app
        run: node --check index.js

      - name: Validate orchestrator syntax
        run: node --check orchestrator/orchestrator.js

      - name: Build WhatsApp app image
        run: docker build -t whatsapp-service:ci ./whatsapp-app

      - name: Build orchestrator image
        run: docker build -t wa-orchestrator:ci ./orchestrator

  deploy:
    if: github.event_name != 'pull_request'
    needs: ci
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy on server over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          script: |
            set -eu

            DEPLOY_PATH="${{ secrets.DEPLOY_PATH }}"

            compose_cmd() {
              if docker compose version >/dev/null 2>&1; then
                docker compose "$@"
                return
              fi
              if command -v docker-compose >/dev/null 2>&1; then
                docker-compose "$@"
                return
              fi
              echo "Docker Compose is not available on server (need docker compose or docker-compose)."
              return 1
            }

            if ! command -v git >/dev/null 2>&1; then
              echo "git is not installed on server"
              exit 1
            fi

            if ! command -v docker >/dev/null 2>&1; then
              echo "docker is not installed on server"
              exit 1
            fi

            if [ ! -d "$DEPLOY_PATH" ]; then
              echo "DEPLOY_PATH does not exist on server: $DEPLOY_PATH"
              exit 1
            fi

            cd "$DEPLOY_PATH"

            if [ ! -d .git ]; then
              echo "DEPLOY_PATH is not a git repository: $DEPLOY_PATH"
              exit 1
            fi

            if [ ! -f docker-compose.yml ]; then
              echo "docker-compose.yml not found in DEPLOY_PATH: $DEPLOY_PATH"
              exit 1
            fi

            git fetch origin main
            git reset --hard origin/main
            docker network inspect wa-net >/dev/null 2>&1 || docker network create wa-net
            docker build -t whatsapp-service:latest ./whatsapp-app
            docker build -t wa-orchestrator:latest ./orchestrator
            compose_cmd up -d --build --remove-orphans orchestrator

            refresh_failures=""

            refresh_whatsapp_instance() {
              name="$1"
              backup_name="${name}_backup_$(date +%s)"
              env_dump=""
              instance_id=""
              http_port=""
              ws_port=""
              session_path=""
              session_volume=""
              status=""

              if ! docker inspect "$name" >/dev/null 2>&1; then
                echo "Skipping missing container: $name"
                return 0
              fi

              env_dump="$(docker inspect --format '{{range .Config.Env}}{{println .}}{{end}}' "$name")"
              instance_id="$(printf '%s\n' "$env_dump" | awk 'index($0, "INSTANCE_ID=") == 1 { print substr($0, 13); exit }')"
              http_port="$(printf '%s\n' "$env_dump" | awk 'index($0, "HTTP_PORT=") == 1 { print substr($0, 11); exit }')"
              ws_port="$(printf '%s\n' "$env_dump" | awk 'index($0, "WS_PORT=") == 1 { print substr($0, 9); exit }')"
              session_path="$(printf '%s\n' "$env_dump" | awk 'index($0, "SESSION_PATH=") == 1 { print substr($0, 14); exit }')"
              session_volume="$(docker inspect --format '{{range .Mounts}}{{if eq .Destination "/sessions"}}{{.Name}}{{end}}{{end}}' "$name" 2>/dev/null || true)"

              instance_id="${instance_id:-${name#wa_}}"
              http_port="${http_port:-9000}"
              ws_port="${ws_port:-9090}"
              session_path="${session_path:-/sessions}"
              session_volume="${session_volume:-wa_sessions_${instance_id}}"

              echo "Refreshing WhatsApp instance: $name"
              docker stop "$name" >/dev/null 2>&1 || true
              if ! docker rename "$name" "$backup_name"; then
                echo "Failed to rename $name to $backup_name"
                refresh_failures="$refresh_failures $name(rename)"
                return 0
              fi

              if ! docker run -d \
                --init \
                --restart unless-stopped \
                --name "$name" \
                --network wa-net \
                --shm-size=1g \
                -e INSTANCE_ID="$instance_id" \
                -e HTTP_PORT="$http_port" \
                -e WS_PORT="$ws_port" \
                -e SESSION_PATH="$session_path" \
                -v "$session_volume:/sessions" \
                whatsapp-service:latest
              then
                echo "New container failed to start, rolling back $name"
                docker rm -f "$name" >/dev/null 2>&1 || true
                docker rename "$backup_name" "$name"
                docker start "$name"
                refresh_failures="$refresh_failures $name(start)"
                return 0
              fi

              attempts=0
              status=""
              while [ "$attempts" -lt 6 ]; do
                status="$(docker inspect --format '{{.State.Status}}' "$name" 2>/dev/null || true)"
                if [ "$status" = "running" ]; then
                  break
                fi
                attempts=$((attempts + 1))
                sleep 5
              done

              if [ "$status" != "running" ]; then
                echo "New container is not running for $name, rolling back"
                docker logs "$name" || true
                docker rm -f "$name" || true
                docker rename "$backup_name" "$name"
                docker start "$name"
                refresh_failures="$refresh_failures $name(status=${status:-unknown})"
                return 0
              fi

              docker rm -f "$backup_name" >/dev/null 2>&1 || true
              echo "Refresh completed for $name"
            }

            set +e
            whatsapp_containers="$(docker ps -a --filter "name=^/wa_" --format '{{.Names}}' | grep -v '_backup_' || true)"
            if [ -z "$whatsapp_containers" ]; then
              echo "No WhatsApp instance containers found to refresh."
            else
              for container_name in $whatsapp_containers; do
                refresh_whatsapp_instance "$container_name"
              done
            fi
            set -e

            if [ -n "$refresh_failures" ]; then
              echo "Deployment finished with instance refresh warnings:$refresh_failures"
            fi
